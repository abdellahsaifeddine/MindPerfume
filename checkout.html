<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, follow" />
    <meta name="theme-color" content="#0a0a0c" />
    <title>Checkout — MindPerfume.ma</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Outfit:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#checkout-main">Skip to content</a>

    <header class="site-header is-scrolled" role="banner">
      <a href="index.html" class="logo-link logo logo--living">Mind<span>Perfume</span></a>
      <nav class="lang-switch" aria-label="Language">
        <button type="button" data-lang="en" aria-pressed="true">EN</button>
        <button type="button" data-lang="fr" aria-pressed="false">FR</button>
        <button type="button" data-lang="ar" aria-pressed="false">عربي</button>
      </nav>
    </header>

    <main id="checkout-main" class="checkout-main">
      <div class="section section--wide checkout-page">
        <h1 class="section__title checkout-page__title" data-i18n-checkout-title>Complete your order</h1>

        <div id="checkout-empty" class="checkout-empty" hidden>
          <p class="section__text" data-i18n-checkout-empty-hint>Your cart is empty.</p>
          <a href="index.html" class="banner__cta" data-i18n-checkout-back>Continue shopping</a>
        </div>

        <div id="checkout-form-wrap">
          <div class="checkout-layout">
            <section class="checkout-summary panel" aria-labelledby="checkout-sum-h">
              <h2 id="checkout-sum-h" class="section__label" data-i18n-checkout-summary>Order summary</h2>
              <div id="checkout-summary-lines"></div>
            </section>

            <form id="checkout-form" class="checkout-form panel" novalidate>
              <label class="checkout-field" for="checkout-fullname">
                <span class="checkout-field__label" data-i18n-checkout-name>Full name</span>
                <input id="checkout-fullname" name="fullname" type="text" autocomplete="name" />
              </label>
              <label class="checkout-field" for="checkout-phone">
                <span class="checkout-field__label" data-i18n-checkout-phone>Phone number</span>
                <input id="checkout-phone" name="phone" type="tel" required autocomplete="tel" />
              </label>
              <label class="checkout-field" for="checkout-address">
                <span class="checkout-field__label" data-i18n-checkout-address>Delivery address</span>
                <textarea id="checkout-address" name="address" rows="3" required autocomplete="street-address"></textarea>
              </label>
              <label class="checkout-field" for="checkout-notes">
                <span class="checkout-field__label" data-i18n-checkout-notes>Notes (optional)</span>
                <textarea id="checkout-notes" name="notes" rows="2"></textarea>
              </label>
              <button type="submit" class="banner__cta checkout-form__submit" data-i18n-checkout-submit>
                Confirm order on WhatsApp
              </button>
            </form>
          </div>

          <p class="checkout-back-wrap">
            <a href="index.html" data-i18n-checkout-back>Continue shopping</a>
          </p>
        </div>
      </div>
    </main>

    <footer class="site-footer" role="contentinfo">
      <p class="domain">MindPerfume.ma</p>
      <nav class="social-footer" aria-label="Social media">
        <a
          class="social-footer__link social-footer__link--instagram"
          href="https://www.instagram.com/mindperfume.ma/"
          target="_blank"
          rel="noopener noreferrer"
          data-social="instagram"
        >
          <svg class="social-footer__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
            <path
              fill="currentColor"
              d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"
            />

        </a>
        <a
          class="social-footer__link social-footer__link--tiktok"
          href="https://www.tiktok.com/@mindperfume.ma?_r=1&amp;_t=ZN-963U3mu4zOo"
          target="_blank"
          rel="noopener noreferrer"
          data-social="tiktok"
        >
          <svg class="social-footer__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
            <path
              fill="currentColor"
              d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1-.1z"

          </svg>
        </a>
      </nav>
      <p class="fine" data-i18n-footer-tagline>MindPerfume.ma — luxury fragrance, rooted in Morocco.</p>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/products-data.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/checkout.js"></script>
  </body>
</html>
